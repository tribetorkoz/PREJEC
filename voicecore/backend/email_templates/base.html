<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ subject or 'VoiceCore' }}</title>
    <!--[if mso]>
    <style type="text/css">
        table {border-collapse: collapse;}
        .button {padding: 12px 24px !important;}
    </style>
    <![endif]-->
</head>
<body style="margin: 0; padding: 0; background-color: #0A0A0A; font-family: Arial, Helvetica, sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #0A0A0A;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 640px; background-color: #1A1A1A; border-radius: 12px; overflow: hidden;">
                    <!-- Header -->
                    <tr>
                        <td style="padding: 30px; text-align: center; border-bottom: 1px solid #27272A;">
                            <table role="presentation" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td style="background-color: #F59E0B; border-radius: 8px; padding: 8px 16px; text-align: center;">
                                        <span style="color: #000; font-size: 18px; font-weight: bold;">VoiceCore</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Content -->
                    <tr>
                        <td style="padding: 30px;">
                            {{ content | safe }}
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td style="padding: 30px; border-top: 1px solid #27272A; text-align: center;">
                            <p style="color: #71717A; font-size: 12px; margin: 0 0 10px 0;">
                                VoiceCore AI Receptionist<br>
                                {{ company_name or 'Your Business' }}
                            </p>
                            <p style="color: #52525B; font-size: 11px; margin: 0;">
                                <a href="{{ unsubscribe_url or '#' }}" style="color: #71717A; text-decoration: underline;">Unsubscribe</a> | 
                                <a href="{{ privacy_url or '#' }}" style="color: #71717A; text-decoration: underline;">Privacy Policy</a>
                            </p>
                            <p style="color: #3F3F46; font-size: 10px; margin: 15px 0 0 0;">
                                &copy; {{ year or '2024' }} VoiceCore. All rights reserved.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
