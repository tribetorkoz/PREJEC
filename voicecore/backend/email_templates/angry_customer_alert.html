<div style="border-left: 4px solid #EF4444; padding-left: 20px;">
    <h1 style="color: #EF4444; font-size: 24px; margin: 0 0 10px 0;">
        ⚠️ Angry Customer Alert
    </h1>
    <p style="color: #A1A1AA; font-size: 14px; margin: 0 0 20px 0;">Immediate Attention Required</p>
    
    <hr style="border: none; border-top: 1px solid #27272A; margin: 20px 0;">
    
    <table style="width: 100%;">
        <tr>
            <td style="padding: 8px 0; color: #A1A1AA; width: 100px;">Caller:</td>
            <td style="padding: 8px 0; color: #F59E0B; font-weight: bold;">{{ caller_phone }}</td>
        </tr>
        <tr>
            <td style="padding: 8px 0; color: #A1A1AA;">Time:</td>
            <td style="padding: 8px 0; color: #FFFFFF;">{{ call_time }}</td>
        </tr>
    </table>
    
    <p style="color: #FFFFFF; margin: 20px 0 10px 0;"><strong>Last statement:</strong></p>
    <div style="background-color: #27272A; padding: 15px; border-radius: 8px; font-style: italic; color: #FCA5A5;">
        "{{ last_quote }}"
    </div>
    
    <table role="presentation" cellspacing="0" cellpadding="0" style="margin: 30px 0 0;">
        <tr>
            <td style="background-color: #EF4444; border-radius: 8px;">
                <a href="{{ recording_url }}" style="display: inline-block; color: #FFF; font-size: 14px; font-weight: bold; padding: 12px 24px; text-decoration: none;">Listen to Recording</a>
            </td>
            <td style="width: 10px;"></td>
            <td style="background-color: #27272A; border-radius: 8px;">
                <a href="{{ dashboard_url }}" style="display: inline-block; color: #FFF; font-size: 14px; padding: 12px 24px; text-decoration: none;">View Dashboard</a>
            </td>
        </tr>
    </table>
</div>
