<div style="text-align: center;">
    <div style="background-color: #22C55E; border-radius: 50%; width: 80px; height: 80px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;">
        <span style="color: #FFF; font-size: 40px;">✓</span>
    </div>
    <h1 style="color: #F59E0B; font-size: 28px; margin: 0 0 10px 0;">You're Live!</h1>
    <p style="color: #FFFFFF; font-size: 24px; margin: 20px 0;"><strong>{{ company_name }}</strong></p>
    <p style="color: #A1A1AA; font-size: 16px; margin: 0 0 10px 0;">
        Your AI receptionist <strong>{{ agent_name }}</strong> is now answering calls at:
    </p>
    <p style="color: #F59E0B; font-size: 32px; font-weight: bold; margin: 20px 0;">{{ phone_number }}</p>
    <table role="presentation" cellspacing="0" cellpadding="0" style="margin: 30px auto 0;">
        <tr>
            <td style="background-color: #F59E0B; border-radius: 8px;">
                <a href="{{ dashboard_url }}" style="display: inline-block; color: #000; font-size: 16px; font-weight: bold; padding: 15px 30px; text-decoration: none;">Go to Dashboard</a>
            </td>
        </tr>
    </table>
    <p style="color: #71717A; font-size: 14px; margin: 30px 0 0 0;">
        Share your new number and start receiving calls!
    </p>
</div>
