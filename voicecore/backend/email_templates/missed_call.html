<div style="text-align: center;">
    <div style="background-color: #F59E0B; border-radius: 50%; width: 80px; height: 80px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;">
        <span style="color: #000; font-size: 40px;">📞</span>
    </div>
    <h1 style="color: #F59E0B; font-size: 24px; margin: 0 0 10px 0;">Missed Call</h1>
    <p style="color: #A1A1AA; font-size: 14px; margin: 0 0 20px 0;">{{ company_name }}</p>
    <p style="color: #FFFFFF; font-size: 28px; margin: 20px 0;"><strong>{{ caller_phone }}</strong></p>
    <table role="presentation" cellspacing="0" cellpadding="0" style="margin: 30px auto 0;">
        <tr>
            <td style="background-color: #F59E0B; border-radius: 8px;">
                <a href="{{ dashboard_url }}" style="display: inline-block; color: #000; font-size: 14px; font-weight: bold; padding: 12px 24px; text-decoration: none;">Call Back Now</a>
            </td>
        </tr>
    </table>
</div>
