<div style="text-align: center;">
    <h1 style="color: {% if calls_so_far == 0 %}#F59E0B{% else %}#22C55E{% endif %}; font-size: 24px; margin: 0 0 20px 0;">
        How is {{ company_name }} doing?
    </h1>
    
    {% if calls_so_far == 0 %}
    <p style="color: #A1A1AA; font-size: 16px; margin: 0 0 10px 0;">
        We noticed your agent hasn't received any calls yet.
    </p>
    <p style="color: #F59E0B; font-size: 16px; margin: 0;">
        Something not working? Let us help.
    </p>
    {% else %}
    <p style="color: #22C55E; font-size: 24px; margin: 0;">
        Great news! Your agent has handled <strong>{{ calls_so_far }}</strong> calls already!
    </p>
    {% endif %}
    
    <table role="presentation" cellspacing="0" cellpadding="0" style="margin: 30px auto 0;">
        <tr>
            <td style="background-color: #27272A; border-radius: 8px;">
                <a href="{{ dashboard_url }}" style="display: inline-block; color: #FFF; font-size: 14px; padding: 12px 24px; text-decoration: none; margin-right: 10px;">View Dashboard</a>
            </td>
            <td style="width: 10px;"></td>
            <td style="background-color: #F59E0B; border-radius: 8px;">
                <a href="{{ support_url }}" style="display: inline-block; color: #000; font-size: 14px; font-weight: bold; padding: 12px 24px; text-decoration: none;">Get Help</a>
            </td>
        </tr>
    </table>
</div>
